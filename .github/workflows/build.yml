name: Build Plugin

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      # 🔥 ЖЁСТКАЯ ОЧИСТКА КЭША
      - name: Kill Maven cache
        run: rm -rf ~/.m2

      - name: Build with Maven
        run: mvn -U -B clean package

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: CommandBlocker
          path: target/*.jar
